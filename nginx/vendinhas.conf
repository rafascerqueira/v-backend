# Vendinhas Nginx Configuration
# Copy to: /etc/nginx/sites-available/vendinhas.conf
# Enable with: ln -s /etc/nginx/sites-available/vendinhas.conf /etc/nginx/sites-enabled/

# --- Real client IP from Cloudflare -----------------------------------------
# Cloudflare terminates TLS and proxies to this origin, so without this every
# request's $remote_addr would be a Cloudflare edge IP — collapsing all rate
# limiting onto a handful of keys. Restore the visitor's real IP from the
# CF-Connecting-IP header, but ONLY when the connection actually comes from a
# Cloudflare range (so a direct attacker who finds the origin can't spoof it).
# This also feeds the X-Forwarded-For we send to the API, where Fastify trusts
# only the loopback hop (TRUST_PROXY=loopback) and reads this real client IP.
# Refresh ranges periodically from https://www.cloudflare.com/ips/.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# Rate limiting (keyed off the real client IP restored above)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=uploads:10m rate=30r/s;

# Upstream servers
upstream vendinhas_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream vendinhas_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name vendinhas.app www.vendinhas.app api.vendinhas.app;
    return 301 https://$server_name$request_uri;
}

# Frontend - vendinhas.app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vendinhas.app www.vendinhas.app;

    # SSL certificates (use certbot)
    ssl_certificate /etc/letsencrypt/live/vendinhas.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vendinhas.app/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    location / {
        limit_req zone=web burst=50 nodelay;
        
        proxy_pass http://vendinhas_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static files caching
    location /_next/static {
        proxy_pass http://vendinhas_web;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /static {
        proxy_pass http://vendinhas_web;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000";
    }
}

# API - api.vendinhas.app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.vendinhas.app;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/vendinhas.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vendinhas.app/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # Personalized storefront links carry an unguessable customer id in the path —
    # don't leak it to third parties via the Referer header.
    add_header Referrer-Policy "no-referrer" always;

    # NOTE: Do NOT add CORS headers here — NestJS owns CORS via enableCors().
    # Adding them in nginx creates duplicate headers that browsers reject.

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json;

    # Max body size for uploads
    client_max_body_size 10M;

    # User uploads (avatars, product images) — served from MinIO object storage
    # when STORAGE_DRIVER=s3. The stored public base is this same path, so existing
    # https://api.vendinhas.app/uploads/<key> URLs keep working after migration.
    # Only reads are exposed; writes need signed MinIO requests and are rejected by
    # the bucket's anonymous "download" policy regardless.
    # Avatars are private — never served over the public path. The app serves them
    # via the authenticated /auth/profile/avatar route. Block here as defense in
    # depth (MinIO also denies anonymous reads on profiles/).
    location ^~ /uploads/profiles/ {
        return 404;
    }

    location /uploads/ {
        limit_except GET HEAD { deny all; }
        limit_req zone=uploads burst=60 nodelay;

        # Trailing /vendinhas-uploads/ maps /uploads/<key> -> bucket key <key>.
        proxy_pass http://127.0.0.1:9000/vendinhas-uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Don't leak MinIO/S3 internals; cache aggressively (keys are immutable).
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://vendinhas_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://vendinhas_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket for notifications
    location /notifications {
        proxy_pass http://vendinhas_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
