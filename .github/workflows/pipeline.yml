name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-flight runs for PRs; queue (not cancel) for main so deploys are sequential
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── CI ──────────────────────────────────────────────────────────────────────
  ci:
    name: CI — lint · build · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Lint
        run: pnpm biome ci .

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key

  # ─── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # generate doesn't connect to the DB — a reachable URL is not required
      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://localhost/placeholder

      - name: Build
        run: pnpm build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Sync compiled output and project manifests — no build step needed on VPS
      - name: Sync artifacts to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/backend/dist/

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            package.json pnpm-lock.yaml prisma/ ecosystem.config.js \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/backend/

      - name: Activate on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /var/www/vendinhas/backend

            echo "--- installing dependencies ---"
            pnpm install --frozen-lockfile

            echo "--- generating Prisma client ---"
            source .env
            pnpm prisma generate

            echo "--- running migrations ---"
            pnpm prisma migrate deploy

            if [ -f "prisma/migrations/manual/subscription_triggers.sql" ]; then
              psql "$DATABASE_URL" -f prisma/migrations/manual/subscription_triggers.sql \
                2>/dev/null || echo "triggers already exist, skipped"
            fi

            echo "--- reloading PM2 ---"
            pm2 reload ecosystem.config.js --update-env

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://api.vendinhas.app/health; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/5 failed — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
