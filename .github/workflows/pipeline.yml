name: Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-flight runs for PRs; queue (not cancel) for main so deploys are sequential
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── CI ──────────────────────────────────────────────────────────────────────
  ci:
    name: CI — lint · build · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout
          5s --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (CVE gate)
        run: |
          # Full report for visibility — never fails the build on its own.
          pnpm audit --prod || true
          # Hard gate: fail only on CRITICAL advisories so accepted lower-severity
          # items (e.g. unreachable lodash high) don't wedge the pipeline.
          pnpm audit --prod --audit-level critical

      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Lint
        run: pnpm biome ci .

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key

  # ─── E2E ───────────────────────────────────────────────────────────────────
  # Postgres + Redis run as native GitHub service containers on the same ports
  # the test infra expects (5433 / 6380), so test/global-setup.ts skips its
  # compose dance under CI=true and only runs `prisma migrate deploy`. The job
  # env below points the booted app at those services; RS256 keys are generated
  # per-run for the realAuth suites. A broken migration fails this job.
  e2e:
    name: E2E — supertest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports: [ "5433:5432" ]
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db" --health-interval 10s
          --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports: [ "6380:6379" ]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout
          5s --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test_user:test_password@localhost:5433/test_db
      REDIS_HOST: localhost
      REDIS_PORT: "6380"
      REDIS_KEY_PREFIX: "vendinhas:test:"
      JWT_KEYS_DIR: ./keys

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # generate doesn't connect to the DB — a reachable URL is not required.
      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://localhost/placeholder

      # TokenService is RS256-only and reads keys/{private,public}.pem at boot;
      # keys/ is gitignored, so the realAuth suites need ephemeral keys here.
      - name: Generate ephemeral RS256 JWT keys
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -out keys/private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: E2E tests
        run: pnpm test:e2e

  # ─── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → VPS
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # generate doesn't connect to the DB — a reachable URL is not required
      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://localhost/placeholder

      - name: Build
        run: pnpm build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Prefer pinned VPS_KNOWN_HOSTS secret (no network dep). Fall back to
          # ssh-keyscan with retries + non-empty validation — keyscan exits 0 on
          # failure, so without -s check known_hosts ends up empty and rsync dies
          # later with a misleading "Host key verification failed".
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
            echo "known_hosts pinned from secret"
          else
            for i in 1 2 3 4 5; do
              ssh-keyscan -H -T 10 ${{ secrets.VPS_HOST }} > /tmp/keyscan 2>/dev/null || true
              if [ -s /tmp/keyscan ]; then
                cat /tmp/keyscan >> ~/.ssh/known_hosts
                echo "keyscan ok on attempt $i"
                exit 0
              fi
              echo "keyscan empty (attempt $i/5), retrying in 10s..."
              sleep 10
            done
            echo "ERROR: ssh-keyscan failed — VPS unreachable on port 22"
            exit 1
          fi

      # Sync compiled output and project manifests — no build step needed on VPS.
      # SSH opts: ConnectTimeout + ConnectionAttempts + ServerAlive* survive
      # transient network blips between GitHub runner and VPS.
      - name: Sync artifacts to VPS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            SSH_OPTS="-i ~/.ssh/deploy_key -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"

            rsync -az --delete \
              -e "ssh $SSH_OPTS" \
              dist/ \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/backend/dist/

            # Mirror prisma/migrations/ exactly so removed or added migration dirs
            # always match the repo. Exclude manual/ — it holds VPS-only SQL
            # (e.g. subscription_triggers.sql) that must not be wiped.
            rsync -az --delete --exclude=manual/ \
              -e "ssh $SSH_OPTS" \
              prisma/migrations/ \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/backend/prisma/migrations/

            # Sync prisma schema and seed additively (migrations handled above)
            rsync -az --exclude=migrations \
              -e "ssh $SSH_OPTS" \
              prisma/ \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/backend/prisma/

            # Sync remaining project files additively (preserves .env, keys/, uploads/, etc.)
            rsync -az \
              -e "ssh $SSH_OPTS" \
              package.json pnpm-lock.yaml ecosystem.config.js nginx/ \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/backend/

      - name: Activate on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /var/www/vendinhas/backend

            echo "--- installing dependencies ---"
            pnpm install --frozen-lockfile

            echo "--- generating Prisma client ---"
            source .env
            pnpm prisma generate

            echo "--- running migrations ---"
            pnpm prisma migrate deploy

            echo "--- verifying migration drift ---"
            DIR_COUNT=$(find prisma/migrations -mindepth 1 -maxdepth 1 -type d ! -name manual | wc -l)
            APPLIED_COUNT=$(psql "$DATABASE_URL" -tAc "SELECT COUNT(*) FROM _prisma_migrations WHERE finished_at IS NOT NULL AND rolled_back_at IS NULL")
            if [ "$DIR_COUNT" != "$APPLIED_COUNT" ]; then
              echo "ERROR: migration drift detected — directories=$DIR_COUNT applied=$APPLIED_COUNT"
              echo "Aborting deploy before nginx/PM2 reload to avoid serving against a stale schema."
              exit 1
            fi
            echo "OK: $DIR_COUNT migrations on disk, $APPLIED_COUNT applied."

            if [ -f "prisma/migrations/manual/subscription_triggers.sql" ]; then
              psql "$DATABASE_URL" -f prisma/migrations/manual/subscription_triggers.sql \
                2>/dev/null || echo "triggers already exist, skipped"
            fi

            echo "--- updating nginx ---"
            cp /var/www/vendinhas/backend/nginx/vendinhas.conf /etc/nginx/sites-available/vendinhas.conf
            nginx -t && systemctl reload nginx

            echo "--- reloading PM2 ---"
            pm2 reload ecosystem.config.js --update-env

      - name: Health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3001/health/liveness; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/5 failed — retrying in 15s..."
              sleep 15
            done
            echo "Health check failed after 5 attempts"
            exit 1

      # Phase 3 — post-deploy security smoke. Warn-only: surfaces regressions in the
      # deploy log without gating the release on edge state outside the app's control.
      # Promote `warn` to `exit 1` once the edge config is stable.
      - name: Security smoke (post-deploy)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -uo pipefail
            warn=0

            # 1. Swagger must NOT be exposed in prod (main.ts mounts it only when !isProduction).
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/docs || echo 000)
            if [ "$code" = "200" ]; then
              echo "WARN: Swagger /docs reachable in prod (HTTP 200)"; warn=1
            else
              echo "OK: /docs not exposed (HTTP $code)"
            fi

            # 2. Dead PagSeguro webhook must stay closed (EDGE_SECURITY_RUNBOOK §).
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3001/webhooks/pagseguro || echo 000)
            if [ "$code" = "410" ]; then
              echo "OK: /webhooks/pagseguro closed (410)"
            else
              echo "WARN: /webhooks/pagseguro returned HTTP $code (expected 410)"; warn=1
            fi

            # 3. Edge security headers (added by nginx). Checked against local nginx with the
            #    API Host; -k skips cert check. Authenticated Origin Pulls (if enabled) may
            #    refuse this local call — hence warn-only.
            hdrs=$(curl -skI https://localhost/ -H 'Host: api.vendinhas.app' || true)
            for h in strict-transport-security x-frame-options x-content-type-options referrer-policy; do
              if echo "$hdrs" | grep -qi "$h"; then
                echo "OK: header $h present"
              else
                echo "WARN: header $h missing at edge"; warn=1
              fi
            done

            if [ "$warn" = "0" ]; then
              echo "Security smoke: all checks passed"
            else
              echo "Security smoke: warnings above (non-blocking)"
            fi
            exit 0
